<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вхід — AI-HRconnect</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1f4e78">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI-HRconnect">
<meta property="og:image" content="https://hrconnect-website.vercel.app/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrconnect-website.vercel.app/og-image.png">
</head>
<body class="auth-page">
<div class="auth-card">
  <div id="logoSlot" class="logo"></div>
  <h1>Вхід у кабінет</h1>
  <p class="subtitle">Введіть email і пароль, щоб продовжити</p>

  
  <button type="button" class="btn btn-google" id="googleBtn" onclick="doGoogleLogin()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Увійти через Google
  </button>
  <div class="auth-divider"><span>або</span></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" id="password" required autocomplete="current-password" minlength="6">
    </div>
    <div class="form-error" id="err"></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Увійти →</button>
  </form>

  <p class="auth-bottom"><a href="/forgot.html">Забули пароль?</a></p>
  <p class="auth-bottom">Немає акаунту? <a href="/register.html">Зареєструватись</a></p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
document.getElementById('logoSlot').innerHTML = brandLogoSvg(56);

function doGoogleLogin() {
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/app/';
  signInWithGoogle(next);
}
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); err.textContent = '';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { err.textContent = '✗ ' + error.message; return; }
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/app/';
  window.location.href = next;
};
</script>
</body>
</html>
