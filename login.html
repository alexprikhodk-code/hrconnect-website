<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вхід — AI-HRconnect</title>
<link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <div id="logoSlot" class="logo"></div>
  <h1>Вхід у кабінет</h1>
  <p class="subtitle">Введіть email і пароль, щоб продовжити</p>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" id="password" required autocomplete="current-password" minlength="6">
    </div>
    <div class="form-error" id="err"></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Увійти →</button>
  </form>

  <p class="auth-bottom"><a href="/forgot.html">Забули пароль?</a></p>
  <p class="auth-bottom">Немає акаунту? <a href="/register.html">Зареєструватись</a></p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
document.getElementById('logoSlot').innerHTML = brandLogoSvg(56);
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); err.textContent = '';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { err.textContent = '✗ ' + error.message; return; }
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/app/';
  window.location.href = next;
};
</script>
</body>
</html>
