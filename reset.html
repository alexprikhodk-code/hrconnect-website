<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Новий пароль — AI-HRconnect</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1f4e78">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI-HRconnect">
<meta property="og:image" content="https://hrconnect-website.vercel.app/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrconnect-website.vercel.app/og-image.png">
</head>
<body class="auth-page">
<div class="auth-card">
  <div id="logoSlot" class="logo"></div>
  <h1>Новий пароль</h1>
  <form id="resetForm">
    <div class="form-group">
      <label class="form-label">Новий пароль</label>
      <input type="password" class="form-input" id="password" required minlength="6">
    </div>
    <div class="form-error" id="err"></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Зберегти</button>
  </form>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
document.getElementById('logoSlot').innerHTML = brandLogoSvg(56);
document.getElementById('resetForm').onsubmit = async (e) => {
  e.preventDefault();
  const err = document.getElementById('err'); err.textContent = '';
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.updateUser({ password });
  if (error) { err.textContent = '✗ ' + error.message; return; }
  err.style.color = 'var(--c-green)';
  err.textContent = '✓ Пароль оновлено. Зараз перейдемо до кабінету...';
  setTimeout(() => { window.location.href = '/app/'; }, 2000);
};
</script>
</body></html>
