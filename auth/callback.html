<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>Вхід — AI-HRconnect</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="/assets/css/main.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1f4e78 0%, #2e7d8f 100%); }
.cb-card { background: white; padding: 40px 48px; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,.18); text-align: center; max-width: 420px; }
.spinner { width: 48px; height: 48px; border: 4px solid #e4e8ee; border-top-color: var(--c-brand); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 18px; }
@keyframes spin { to { transform: rotate(360deg); } }
.cb-card h1 { margin: 0 0 8px; font-size: 22px; color: var(--c-brand); }
.cb-card p { color: var(--c-muted); font-size: 14px; line-height: 1.5; margin: 0; }
.err { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
</style>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
<div class="cb-card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Вхід через Google...</h1>
  <p id="msg">Перенаправляємо вас у кабінет</p>
  <div id="errBox" style="display:none" class="err"></div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script>
(async () => {
  try {
    // Supabase auto-handles the OAuth code from URL hash
    const { data: { session }, error } = await sb.auth.getSession();
    if (error) throw error;

    if (!session) {
      // Wait a bit for hash to be processed
      await new Promise(r => setTimeout(r, 800));
      const { data: { session: s2 } } = await sb.auth.getSession();
      if (!s2) throw new Error('Не вдалося отримати сесію після Google входу');
    }

    // Get user
    const { data: { user } } = await sb.auth.getUser();
    if (!user) throw new Error('Користувача не знайдено');

    // Ensure profile exists (Google login bypasses the auth.users trigger sometimes)
    const { data: profile } = await sb.from('profiles').select('id').eq('id', user.id).maybeSingle();
    if (!profile) {
      await sb.from('profiles').insert({
        id: user.id,
        email: user.email,
        full_name: user.user_metadata?.full_name || user.user_metadata?.name || null
      });
      // Also create default subscription
      await sb.from('subscriptions').insert({
        user_id: user.id, tier: 'free', tests_quota: 2
      });
    }

    // Get redirect target
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/app/';
    document.getElementById('title').textContent = '✓ Успішно увійшли!';
    document.getElementById('msg').textContent = 'Перенаправляємо в кабінет...';
    setTimeout(() => { window.location.href = next; }, 600);
  } catch (e) {
    console.error('OAuth callback error:', e);
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = '⚠ Помилка входу';
    document.getElementById('msg').textContent = 'Спробуйте ще раз або зверніться до підтримки';
    const eb = document.getElementById('errBox');
    eb.style.display = 'block';
    eb.textContent = e.message || String(e);
    setTimeout(() => { window.location.href = '/login.html'; }, 5000);
  }
})();
</script>
</body>
</html>
