function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function bandColorCls(level) {
  if (level === 'Низький') return 'low';
  if (level === 'Середній') return 'mid';

}

function computeLocalVerdict(c) {
  // Local heuristic: only if no AI verdict
  if (c.verdict) return { verdict: c.verdict, label: c.verdict === 'Перформер' ? 'Продуктивний та ефективний' : (c.verdict === 'Делатель' ? 'Виконавець' : c.verdict), confidence: c.verdict_confidence || 'попередня', reasons: c.verdict_reasons || [] };

  // Heuristic from raw_answers
  const a = c.raw_answers || {};
  let score = 0; const reasons = [];
  const agrees = (a.agrees_product || '').toLowerCase();
  if (agrees.includes('так, абсолютно')) { score += 2; reasons.push('Безумовно погоджується, що кожна посада має продукт'); }
  else if (agrees.startsWith('швидше так') || agrees.startsWith('так')) { score += 1; reasons.push('Погоджується з концепцією продукту посади'); }
  else if (agrees.startsWith('ні') || agrees.startsWith('швидше ні')) { score -= 1; reasons.push('Не погоджується з концепцією продукту посади'); }

  const product = (a.product || '').toLowerCase();
  const thingPatterns = /(угод|обід|обед|клиент|клієнт|звіт|отчет|прибут|виручк|продаж|подача|меню|страв|обслугов|сервіс|товар|консультац|угод)/;
  const procPatterns = /(комуник|коммуник|управл|керую|спілкуван|обов'язк|обязанн|процес|процесс)/;
  if (thingPatterns.test(product)) { score += 2; reasons.push('Продукт описаний як конкретний результат'); }
  else if (procPatterns.test(product) && !thingPatterns.test(product)) { score -= 1; reasons.push('Продукт описаний як процес, а не результат'); }
  else if (product.length > 15) { score += 1; reasons.push('Опис продукту присутній'); }

  const res = ((a.results || '') + ' ' + (a.achievements || '')).toLowerCase();
  const hasNumbers = /\d{2,}/.test(res);
  if (hasNumbers && /(збільш|увелич|зріс|вирос|оптиміз|оптимиз|прибут)/.test(res)) { score += 2; reasons.push('Конкретні цифрові досягнення'); }
  else if (hasNumbers) { score += 1; reasons.push('Є кількісні дані у відповідях'); }
  else if (res.trim().length < 40) { score -= 1; reasons.push('Результати описані абстрактно'); }

  const comp = (a.comparison || '').toLowerCase();
  if (comp.includes('значно вищ') || comp.includes('дещо вищ')) { score += 1; reasons.push('Оцінює свої результати вище за колег'); }
  else if (comp.includes('нижч')) { score -= 1; reasons.push('Оцінює свої результати нижче за колег'); }

  const plan = (a.plan_performance || '').toLowerCase();
  if (plan.startsWith('перевик')) { score += 1; reasons.push('Заявляє про перевиконання плану'); }
  else if (plan.startsWith('не завжди') || plan.startsWith('часто не')) { score -= 1; reasons.push('Часто не виконує план'); }

  let verdict, label, confidence;
  if (score >= 5) { verdict = 'Перформер'; label = 'Продуктивний та ефективний'; confidence = 'висока'; }
  else if (score >= 2) { verdict = 'Перформер'; label = 'Продуктивний та ефективний'; confidence = 'помірна'; }
  else if (score >= 0) { verdict = 'Делатель'; label = 'Виконавець'; confidence = 'помірна'; }
  else { verdict = 'Делатель'; label = 'Виконавець'; confidence = 'висока'; }
  return { verdict, label, confidence, reasons, score };
}

function pointConclusion(code, level, ambiguous) {
  if (ambiguous) return POINT_CONCLUSIONS[code]?.["Невизначено"] || "—";
  return POINT_CONCLUSIONS[code]?.[level] || "—";
}

// ==== Hire recommendation logic ====
function computeHireRecommendation(c, verdict) {
  const points = c.points || {};
  const risks = [];
  const strengths = [];

  const get = (code) => points[code] ? (points[code].score || 0) : null;
  const lvl = (code) => points[code] ? points[code].level : null;

  // Strong red flags
  if (lvl('B') === 'Низький') risks.push('низький Оптимізм (B) — фокус на проблемах може ускладнити роботу в команді');
  if (lvl('G') === 'Низький') risks.push('низька Відповідальність (G) — не бере причинність, потребуватиме постійного контролю');
  if (lvl('H') === 'Низький') risks.push('низька Правильність оцінки (H) — ризик конфліктів через зайву критичність');
  if (lvl('C') === 'Низький') risks.push('низьке Самоволодіння (C) — нестабільна реакція на тиск');
  if (lvl('F') === 'Низький') risks.push('низька Наполегливість (F) — ризик кидати справи на півдорозі');
  if (c.iq != null && c.iq < 90) risks.push('IQ ' + c.iq + ' — нижче середнього, обмежує керівні ролі');
  if (c.reproduction != null && c.reproduction < 65) risks.push('Здатність відтворення ' + c.reproduction + ' — нижче порогу для керівних ролей');

  // Strengths
  if (lvl('A') === 'Високий') strengths.push('висока Стабільність — дисципліна і фокус');
  if (lvl('B') === 'Високий') strengths.push('високий Оптимізм — енергетично заряджає команду');
  if (lvl('G') === 'Високий') strengths.push('висока Відповідальність — бере результат на себе');
  if (lvl('F') === 'Високий') strengths.push('висока Наполегливість — доводить справи до кінця');
  if (lvl('E') === 'Високий') strengths.push('висока Активність — ініціативна, готова до викликів');
  if (verdict.verdict === 'Перформер') strengths.push('бачить продукт посади і має конкретні досягнення');

  // Decision matrix
  let recommendation, recColor, recIcon, recReason;
  const isPerf = verdict.verdict === 'Перформер';
  const isHighConf = verdict.confidence === 'висока';
  const critRisks = risks.length;

  if (isPerf && isHighConf && critRisks <= 1) {
    recommendation = 'Рекомендовано до найму';
    recColor = 'var(--c-green-ink)';
    recIcon = '✓';
    recReason = 'Сильний профіль продуктивності + збалансовані особистісні риси.';
  } else if (isPerf && critRisks <= 2) {
    recommendation = 'Рекомендовано з застереженнями';
    recColor = '#92400e';
    recIcon = '⚠';
    recReason = 'Продуктивний кандидат, але є ' + critRisks + ' ризик(и), що варто врахувати.';
  } else if (isPerf && critRisks >= 3) {
    recommendation = 'Розглядати тільки на виконавчу позицію';
    recColor = '#92400e';
    recIcon = '⚠';
    recReason = 'Розуміє продукт, але кількість червоних прапорів (' + critRisks + ') не дозволяє рекомендувати на керівну роль.';
  } else if (!isPerf && critRisks <= 1) {
    recommendation = 'Розглядати на виконавчу роль з наглядом';
    recColor = '#92400e';
    recIcon = '⚠';
    recReason = 'Не показує ознак Продуктивного, але профіль особистості прийнятний.';
  } else {
    recommendation = 'НЕ рекомендовано до найму';
    recColor = 'var(--c-red-ink)';
    recIcon = '✗';
    recReason = 'Поєднання ' + (isPerf ? '' : 'Виконавця ') + (critRisks ? 'і ' + critRisks + ' ризик(ів) ' : '') + 'робить кандидата високоризиковим.';
  }

  return { recommendation, recColor, recIcon, recReason, risks, strengths };
}


async function load() {
  const params = new URLSearchParams(window.location.search);
  candidateId = params.get('id');
  if (!candidateId) {
    document.getElementById('loader').innerHTML = 'Не вказано id кандидата.<br><a href="/app/candidates.html">← Назад</a>';
    return;
  }
  const user = await requireAuth();
  if (!user) return;

  const { data, error } = await sb.from('candidates').select('*').eq('id', candidateId).maybeSingle();
  if (error || !data) {
    document.getElementById('loader').innerHTML = 'Кандидата не знайдено.<br><a href="/app/candidates.html">← Назад</a>';
    return;
  }
  candidateData = data;
  render(data);
}

function render(c) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  const v = computeLocalVerdict(c);
  const vcls = v.verdict === 'Перформер' ? 'perf' : (v.verdict === 'Делатель' ? 'del' : 'none');
  const statusCls = c.test_status === 'completed' ? 'completed' : 'pending';
  const statusTxt = c.test_status === 'completed' ? '✓ Тест завершено' : '⏳ Очікує на проходження';

  // Hero
  let html = `
    <div class="cand-hero">
      <div>
        <h1>${esc(c.name)}</h1>
        <div class="meta">${esc(c.position || 'Посада не вказана')}${c.email ? ' · ' + esc(c.email) : ''}${c.phone ? ' · ' + esc(c.phone) : ''}</div>
        <span class="cand-status ${statusCls}">${statusTxt}</span>
        ${c.test_completed_at ? `<span style="color:var(--c-muted); font-size:12px; margin-left:10px">${new Date(c.test_completed_at).toLocaleString('uk-UA')}</span>` : ''}
      </div>
      <div class="big-verdict ${vcls}">
        <div class="lbl">Вердикт</div>
        <div class="val">${esc(v.label)}</div>
        <div class="conf">впевненість: ${esc(v.confidence)}</div>
      </div>
    </div>
  `;

  // If test not yet completed — show invite link
  if (c.test_status !== 'completed') {
    const url = window.location.origin + '/test/?t=' + (c.test_link_token || '');
    html += `
      <div class="section">
        <h2>Чекаємо на проходження тесту</h2>
        <p>Надішліть кандидату це посилання у месенджер:</p>
        <input type="text" readonly value="${esc(url)}" class="form-input" onclick="this.select()">
        <div style="display:flex; gap:10px; margin-top:12px">
          <button class="btn btn-primary" onclick="navigator.clipboard.writeText('${esc(url)}'); this.textContent='✓ Скопійовано'">📋 Скопіювати</button>
          <a class="btn btn-ghost" href="${esc(url)}" target="_blank">👁 Переглянути сторінку тесту</a>
        </div>
      </div>
    `;
  } else {
    // KPI cards
    html += `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="lbl">IQ</div>
          <div class="val">${c.iq != null ? c.iq : '—'}</div>
          <div class="desc">${esc(c.iq_band || 'не виміряно')}</div>
        </div>
        <div class="kpi-card">
          <div class="lbl">Здатність відтворення</div>
          <div class="val">${c.reproduction != null ? c.reproduction : '—'}</div>
          <div class="desc">${esc(c.reproduction_band || 'не виміряно')}</div>
        </div>
        <div class="kpi-card">
          <div class="lbl">Особистий продукт (за словами)</div>
          <div class="val" style="font-size:14px; font-weight:500; line-height:1.4; margin-top:6px">${esc((c.product_self || '—').slice(0, 90))}${c.product_self && c.product_self.length > 90 ? '…' : ''}</div>
        </div>
      </div>
    `;

    // Hire recommendation
    const hire = computeHireRecommendation(c, v);
    const hireCls = hire.recommendation.includes('НЕ рекомендовано') || hire.recommendation.includes('тільки на виконавчу') ? 'red' :
                    hire.recommendation.includes('Рекомендовано до найму') ? 'green' : 'amber';
    html += `<div class="hire-rec ${hireCls}">
      <div class="icon">${hire.recIcon}</div>
      <div style="flex:1">
        <div class="title" style="color:${hire.recColor}">${esc(hire.recommendation)}</div>
        <div class="desc">${esc(hire.recReason)}</div>
        ${hire.strengths.length ? '<div style="margin-top:10px"><strong style="font-size:12px; color:#166534">Сильні сторони:</strong><br>' + hire.strengths.map(s => '<span class="strength-tag">+ ' + esc(s) + '</span>').join('') + '</div>' : ''}
        ${hire.risks.length ? '<div style="margin-top:8px"><strong style="font-size:12px; color:#991b1b">Ризики:</strong><br>' + hire.risks.map(r => '<span class="risk-tag">! ' + esc(r) + '</span>').join('') + '</div>' : ''}
      </div>
    </div>`;

    // Verdict reasoning
    if (v.reasons && v.reasons.length) {
      html += `<div class="section">
        <h2>Обґрунтування вердикту по продуктивності</h2>
        <div class="reasons-list"><ul>${v.reasons.map(r => '<li>' + esc(r) + '</li>').join('')}</ul></div>
        <p style="color:var(--c-muted); font-size:13px; margin-top:14px">Базовий локальний аналіз. У наступному релізі — поглиблений AI-розбір через OpenAI з цитатами з відповідей.</p>
      </div>`;
    }

    // Points A-J
    if (c.points && Object.keys(c.points).length) {
      html += `<div class="section">
        <h2>Особистісні риси — 10 точок</h2>`;
      POINT_ORDER.forEach(code => {
        const p = c.points[code];
        if (!p) return;
        const score = p.score != null ? p.score : 0;
        const level = p.level || (score <= -19 ? 'Низький' : (score < 32 ? 'Середній' : 'Високий'));
        const barCls = bandColorCls(level);
        const ambiguous = p.ambiguous === true;
        // Position bar: map -100..100 → percentage width
        const widthPct = Math.max(3, Math.min(100, Math.abs(score) / 100 * 50));
        const leftPct = score < 0 ? (50 - widthPct) : 50;
        const conclusion = pointConclusion(code, level, ambiguous);
        const displayLevel = ambiguous ? 'Невизначено' : level;
        const displayCls = ambiguous ? 'ambiguous' : level;
        html += `<div class="point-row">
          <span class="code">${code}</span>
          <span class="label">${esc(p.label || code)}<br><span style="font-size:11px; color:var(--c-muted); font-weight:400">${esc(TRAIT_DEFINITIONS[code] || '')}</span></span>
          <div class="bar">
            <div style="position:absolute; left:50%; top:-3px; bottom:-3px; width:2px; background:var(--c-muted); opacity:0.4"></div>
            <div class="bar-fill ${barCls}" style="left:${leftPct}%; width:${widthPct}%"></div>
          </div>
          <span class="score">${score}</span>
          <span class="level-badge ${displayCls}">${displayLevel}</span>
        </div>
        <div class="point-conclusion">${esc(conclusion)}</div>`;
      });
      html += `</div>`;
    }

    // Productivity answers
    if (c.raw_answers && Object.keys(c.raw_answers).length) {
      html += `<div class="section">
        <h2>Відповіді кандидата на блок продуктивності</h2>`;
      Object.keys(PRODUCTIVITY_LABELS).forEach(k => {
        const v = c.raw_answers[k];
        if (!v) return;
        html += `<div class="answer-row">
          <div class="q">${PRODUCTIVITY_LABELS[k]}</div>
          <div class="a">${esc(v)}</div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
}

window.deleteCand = async function () {
  if (!confirm('Видалити кандидата «' + (candidateData?.name || '') + '» назавжди?')) return;
  await sb.from('candidates').delete().eq('id', candidateId);
  window.location.href = '/app/candidates.html';
};

load();
</script>
</body></html>
