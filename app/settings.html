<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Профіль — HRconnect</title>
<link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>
<div class="app-shell">
  <aside class="app-side">
    <div class="logo" id="sideLogo"></div>
    <div class="nav-section">Робота з кандидатами</div>
    <a href="/app/" class="nav-item">📊 Дашборд</a>
    <a href="/app/candidates.html" class="nav-item">👥 Кандидати</a>
    <a href="/app/upload.html" class="nav-item">⬆ Завантажити тест</a>
    <div class="nav-section">Налаштування</div>
    <a href="/app/settings.html" class="nav-item active">⚙ Профіль</a>
    <a href="/app/subscription.html" class="nav-item">💳 Підписка</a>
    <a href="#" onclick="signOut(); return false;" class="nav-item">↩ Вийти</a>
  </aside>

  <main class="app-main">
    <div class="app-topbar"><strong>Профіль</strong></div>
    <div class="app-content">
      <div class="card" style="max-width:540px">
        <form id="profileForm">
          <div class="form-group"><label class="form-label">Імʼя</label><input type="text" class="form-input" id="fullName"></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="email" readonly></div>
          <div class="form-group"><label class="form-label">Телефон</label><input type="tel" class="form-input" id="phone"></div>
          <div class="form-group"><label class="form-label">Компанія</label><input type="text" class="form-input" id="company"></div>
          <div class="form-error" id="err"></div>
          <button type="submit" class="btn btn-primary">Зберегти</button>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
document.getElementById('sideLogo').innerHTML = brandLogoSvg(34) + '<span>HRconnect</span>';
(async () => {
  const user = await requireAuth();
  const p = await getMyProfile();
  if (p) {
    document.getElementById('fullName').value = p.full_name || '';
    document.getElementById('email').value = p.email || '';
    document.getElementById('phone').value = p.phone || '';
    document.getElementById('company').value = p.company || '';
  }
})();
document.getElementById('profileForm').onsubmit = async (e) => {
  e.preventDefault();
  const user = await currentUser();
  const err = document.getElementById('err'); err.textContent = '';
  const { error } = await sb.from('profiles').update({
    full_name: document.getElementById('fullName').value,
    phone: document.getElementById('phone').value,
    company: document.getElementById('company').value
  }).eq('id', user.id);
  if (error) { err.textContent = error.message; return; }
  err.style.color = 'var(--c-green)'; err.textContent = '✓ Збережено';
};
</script>
</body></html>
