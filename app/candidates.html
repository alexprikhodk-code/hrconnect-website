<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кандидати — AI-HRconnect</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1f4e78">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI-HRconnect">
<meta property="og:image" content="https://hrconnect-website.vercel.app/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrconnect-website.vercel.app/og-image.png">
</head>
<body>
<div class="app-shell">
  <aside class="app-side">
    <div class="logo" id="sideLogo"></div>
    <a href="/" class="nav-item">🏠 На головну сторінку сайта</a>
    <div class="nav-section">Робота з кандидатами</div>
    <a href="/app/" class="nav-item">📊 Дашборд</a>
    <a href="/app/candidates.html" class="nav-item active">👥 Кандидати</a>
    <a href="/app/upload.html" class="nav-item">🤖 AI аналіз резюме</a>
    <div class="nav-section">Налаштування</div>
    <a href="/app/settings.html" class="nav-item">⚙ Профіль</a>
    <a href="/app/subscription.html" class="nav-item">💳 Підписка</a>
    <a href="#" onclick="signOut(); return false;" class="nav-item">↩ Вийти</a>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <strong>Кандидати</strong>
      <button class="btn btn-primary" onclick="openInvite()">+ Запросити кандидата</button>
    </div>

    <div class="app-content">
      <p class="muted">Створіть запит на тестування — кандидат пройде тест за посиланням, результат зʼявиться у вас автоматично.</p>
      <div id="list"></div>
    </div>
  </main>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(15,30,50,0.55); z-index:100; align-items:center; justify-content:center; overflow-y:auto; padding:20px 0">
  <div class="card" style="max-width:460px; width:90%; max-height:90vh; overflow-y:auto; padding:20px 24px">
    <h3 style="margin:0 0 14px; font-size:18px">Новий кандидат</h3>
    <form id="inviteForm">
      <div class="form-group">
        <label class="form-label">Імʼя кандидата</label>
        <input type="text" class="form-input" id="invName" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email (необовʼязково)</label>
        <input type="email" class="form-input" id="invEmail">
      </div>
      <div class="form-group">
        <label class="form-label">Телефон (необовʼязково)</label>
        <input type="tel" class="form-input" id="invPhone" placeholder="+380...">
      </div>
      <div class="form-group">
        <label class="form-label">Посада, на яку розглядаєте</label>
        <input type="text" class="form-input" id="invPosition">
      </div>
      <div class="form-group">
        <label class="form-label">Призначити тести</label>
        <div id="testsPicker" style="display:flex; flex-direction:column; gap:5px; margin-top:6px"></div>
        <div style="display:flex; gap:8px; margin-top:8px">
          <button type="button" id="pickAllBtn" style="background:none; border:1px solid var(--c-line); border-radius:6px; padding:5px 12px; cursor:pointer; font-size:12px; color:var(--c-muted)">Усі</button>
          <button type="button" id="pickNoneBtn" style="background:none; border:1px solid var(--c-line); border-radius:6px; padding:5px 12px; cursor:pointer; font-size:12px; color:var(--c-muted)">Скинути</button>
        </div>
      </div>
      <div class="form-error" id="invErr"></div>
      <div style="display:flex; gap:10px">
        <button type="submit" class="btn btn-primary">Створити</button>
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal').style.display='none'">Скасувати</button>
      </div>
    </form>
    <div id="inviteResult" style="display:none; margin-top:16px"></div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
document.getElementById('sideLogo').innerHTML = brandLogoSvg(34) + '<span>AI-HRconnect</span>';

// === Test picker ===
const PICKER_TESTS = [
  { id: 'productivity', ic: '📋', name: 'Продуктивність' },
  { id: 'enneagram',    ic: '🌀', name: 'Еннеаграма' },
  { id: 'disc',         ic: '📊', name: 'DISC' },
  { id: 'bigfive',      ic: '🌌', name: 'Big Five' },
  { id: 'iq',           ic: '🧠', name: 'IQ' },
  { id: 'reproduction', ic: '👁️', name: 'Відтворення' }
];
const pickerState = { productivity: true, enneagram: true, disc: true, bigfive: true, iq: true, reproduction: true };

function renderPicker() {
  const wrap = document.getElementById('testsPicker');
  if (!wrap) return;
  wrap.innerHTML = PICKER_TESTS.map((t, i) => {
    const on = pickerState[t.id] !== false;
    return `<div data-id="${t.id}" class="pick-row" style="display:flex; align-items:center; gap:10px; padding:8px 12px; border:1px solid ${on ? '#1f4e78' : '#e4e8ee'}; background:${on ? '#eff6fb' : 'white'}; border-radius:8px; cursor:pointer; font-size:14px; user-select:none; transition:all .15s">
      <span style="color:${on ? '#1f4e78' : '#94a3b8'}; font-weight:700; min-width:24px">${i + 1})</span>
      <span style="display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:4px; border:2px solid ${on ? '#16a34a' : '#cbd5e1'}; background:${on ? '#16a34a' : 'white'}; color:white; font-size:13px; font-weight:900; flex-shrink:0">${on ? '✓' : ''}</span>
      <span style="font-size:18px; line-height:1">${t.ic}</span>
      <span style="color:#0f172a">${t.name}</span>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.pick-row').forEach(row => {
    row.onclick = () => {
      const id = row.dataset.id;
      pickerState[id] = !(pickerState[id] !== false);
      renderPicker();
    };
  });
}

function getAssignedTests() {
  return PICKER_TESTS.filter(t => pickerState[t.id] !== false).map(t => t.id);
}

renderPicker();
document.getElementById('pickAllBtn').onclick = () => { PICKER_TESTS.forEach(t => pickerState[t.id] = true); renderPicker(); };
document.getElementById('pickNoneBtn').onclick = () => { PICKER_TESTS.forEach(t => pickerState[t.id] = false); renderPicker(); };

function openInvite() {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('inviteForm').style.display = 'block';
  document.getElementById('inviteResult').style.display = 'none';
  document.getElementById('invName').focus();
}

document.getElementById('inviteForm').onsubmit = async (e) => {
  e.preventDefault();
  const user = await currentUser();
  const token = crypto.randomUUID().replace(/-/g, '').slice(0, 16);
  const assignedTests = getAssignedTests();
  if (assignedTests.length === 0) {
    alert('Оберіть хоча б один тест для призначення.');
    return;
  }
  const { data, error } = await sb.from('candidates').insert({
    user_id: user.id,
    name: document.getElementById('invName').value.trim(),
    email: document.getElementById('invEmail').value.trim() || null,
    phone: document.getElementById('invPhone').value.trim() || null,
    position: document.getElementById('invPosition').value.trim() || null,
    test_link_token: token,
    test_status: 'pending',
    assigned_tests: assignedTests
  }).select().single();
  if (error) { document.getElementById('invErr').textContent = error.message; return; }

  const url = window.location.origin + '/test/?t=' + token;
  document.getElementById('inviteForm').style.display = 'none';
  document.getElementById('inviteResult').style.display = 'block';
  document.getElementById('inviteResult').innerHTML =
    '<div style="background:#dff2dc; padding:14px; border-radius:8px; color:#2e7d32; margin-bottom:14px"><strong>✓ Створено!</strong></div>' +
    '<p>Посилання для кандидата:</p>' +
    '<input type="text" readonly value="' + url + '" class="form-input" onclick="this.select()">' +
    '<button class="btn btn-primary mt-4" onclick="navigator.clipboard.writeText(\'' + url + '\'); this.textContent=\'✓ Скопійовано\'">📋 Скопіювати посилання</button>' +
    '<button class="btn btn-ghost mt-4" style="margin-left:8px" onclick="document.getElementById(\'modal\').style.display=\'none\'; refresh()">Закрити</button>';
  refresh();
};

async function refresh() {
  const { data: cands } = await sb.from('candidates').select('*').order('created_at', { ascending: false });
  if (!cands || cands.length === 0) {
    document.getElementById('list').innerHTML = '<div class="card text-center"><p class="muted">Поки немає кандидатів. Натисніть «+ Запросити кандидата».</p></div>';
    return;
  }
  document.getElementById('list').innerHTML = '<div class="card" style="padding:0; overflow:hidden">' +
    '<table style="width:100%; border-collapse:collapse; font-size:14px"><thead style="background:#f8fafc; border-bottom:1px solid var(--c-line)"><tr>' +
    '<th style="text-align:left; padding:12px 16px">Імʼя</th><th style="text-align:left; padding:12px 16px">Посада</th><th style="text-align:left; padding:12px 16px">Статус</th><th style="text-align:left; padding:12px 16px">Посилання</th><th style="text-align:left; padding:12px 16px"></th>' +
    '</tr></thead><tbody>' +
    cands.map(c => {
      const url = c.test_link_token ? (window.location.origin + '/test/?t=' + c.test_link_token) : '';
      const ALL_TESTS = [
        { id: 'productivity', name: 'Тест на продуктивність',  icon: '📋', done: !!c.productivity_completed_at || !!c.raw_answers || (c.points && Object.keys(c.points).length > 0) },
        { id: 'enneagram',    name: 'Еннеаграма',              icon: '🌀', done: c.enneagram_type != null },
        { id: 'disc',         name: 'DISC',                     icon: '📊', done: !!c.disc_dominant },
        { id: 'bigfive',      name: 'Big Five (OCEAN)',         icon: '🌌', done: !!c.bigfive_dominant },
        { id: 'iq',           name: 'IQ-тест',                  icon: '🧠', done: c.iq != null },
        { id: 'reproduction', name: 'Тест на відтворення',      icon: '👁️', done: c.reproduction != null }
      ];
      const completed = ALL_TESTS.filter(t => t.done).length;
      const total = 6;
      const pct = Math.round(completed / total * 100);
      const statusColor = completed === total ? '#166534' : (completed === 0 ? 'var(--c-muted)' : '#b45309');
      const statusBg = completed === total ? '#dcfce7' : (completed === 0 ? '#f1f5f9' : '#fef3c7');
      const iconsHTML = ALL_TESTS.map(t => {
        const bg = t.done ? 'background:linear-gradient(135deg, #86efac 0%, #22c55e 100%); box-shadow:0 1px 3px rgba(34,197,94,.3); color:white' : 'background:#f1f5f9; opacity:0.5';
        const titleAttr = esc(t.name) + (t.done ? ' — пройдено' : ' — не пройдено');
        return '<span title="' + titleAttr + '" style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; font-size:12px; cursor:help; ' + bg + '">' + t.icon + '</span>';
      }).join(' ');
      const progressHTML = '<div><span style="background:' + statusBg + '; color:' + statusColor + '; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600">' + completed + '/' + total + ' · ' + pct + '%</span><div style="margin-top:5px; display:flex; gap:4px">' + iconsHTML + '</div></div>';
      return '<tr style="border-top:1px solid var(--c-line)">' +
        '<td style="padding:12px 16px; font-weight:600"><a href="/app/candidate.html?id=' + c.id + '" style="color:var(--c-brand)">' + esc(c.name) + '</a></td>' +
        '<td style="padding:12px 16px; color:var(--c-muted)">' + esc(c.position || '—') + '</td>' +
        '<td style="padding:12px 16px">' + progressHTML + '</td>' +
        '<td style="padding:12px 16px">' +
          (url ? '<div><a href="' + url + '" target="_blank" style="font-size:13px; font-weight:600; color:var(--c-brand)">🔗 Посилання на тестування</a><div style="font-size:11px; color:var(--c-muted); margin-top:3px">Кандидат побачить меню з усіма призначеними тестами</div><div style="margin-top:6px"><button onclick="copyLink(this, \'' + url + '\')" style="background:none; border:1px solid var(--c-line); border-radius:6px; padding:3px 10px; cursor:pointer; font-size:11px; color:var(--c-muted)">📋 Скопіювати</button></div></div>' : '<span style="color:var(--c-muted); font-size:12px">—</span>') +
        '</td>' +
        '<td style="padding:12px 16px"><button class="btn btn-ghost" style="padding:5px 12px; font-size:12px" onclick="deleteCand(\'' + c.id + '\')">Видалити</button></td>' +
      '</tr>';
    }).join('') + '</tbody></table></div>';
}

async function deleteCand(id) {
  if (!confirm('Видалити кандидата?')) return;
  await sb.from('candidates').delete().eq('id', id);
  refresh();
}

function copyLink(btn, url) {
  navigator.clipboard.writeText(url);
  const orig = btn.textContent;
  btn.textContent = '✓ Скопійовано';
  setTimeout(() => { btn.textContent = orig; }, 2000);
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

(async () => { await requireAuth();
    refresh();
  })();
</script>
<script src="/assets/js/ux.js"></script>
</body></html>
