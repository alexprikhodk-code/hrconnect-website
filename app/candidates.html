<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кандидати — AI-HRconnect</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1f4e78">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI-HRconnect">
<meta property="og:image" content="https://hrconnect-website.vercel.app/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hrconnect-website.vercel.app/og-image.png">
</head>
<body>
<div class="app-shell">
  <aside class="app-side">
    <div class="logo" id="sideLogo"></div>
    <a href="/" class="nav-item" style="margin-bottom:10px; opacity:0.85; font-size:13px">🏠 На головну сайту</a>
    <div class="nav-section">Робота з кандидатами</div>
    <a href="/app/" class="nav-item">📊 Дашборд</a>
    <a href="/app/candidates.html" class="nav-item active">👥 Кандидати</a>
    <a href="/app/upload.html" class="nav-item">⬆ Завантажити тест</a>
    <div class="nav-section">Налаштування</div>
    <a href="/app/settings.html" class="nav-item">⚙ Профіль</a>
    <a href="/app/subscription.html" class="nav-item">💳 Підписка</a>
    <a href="#" onclick="signOut(); return false;" class="nav-item">↩ Вийти</a>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <strong>Кандидати</strong>
      <button class="btn btn-primary" onclick="openInvite()">+ Запросити кандидата</button>
    </div>

    <div class="app-content">
      <p class="muted">Створіть запит на тестування — кандидат пройде тест за посиланням, результат зʼявиться у вас автоматично.</p>
      <div id="list"></div>
    </div>
  </main>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(15,30,50,0.55); z-index:100; align-items:center; justify-content:center;">
  <div class="card" style="max-width:480px; width:90%">
    <h3 style="margin-top:0">Новий кандидат</h3>
    <form id="inviteForm">
      <div class="form-group">
        <label class="form-label">Імʼя кандидата</label>
        <input type="text" class="form-input" id="invName" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email (необовʼязково)</label>
        <input type="email" class="form-input" id="invEmail">
      </div>
      <div class="form-group">
        <label class="form-label">Телефон (необовʼязково)</label>
        <input type="tel" class="form-input" id="invPhone" placeholder="+380...">
      </div>
      <div class="form-group">
        <label class="form-label">Посада, на яку розглядаєте</label>
        <input type="text" class="form-input" id="invPosition">
      </div>
      <div class="form-group">
        <label class="form-label">Призначити тести</label>
        <div class="tests-picker" id="testsPicker">
          <label class="test-check on"><span class="num">1</span><input type="checkbox" value="productivity" checked><div class="body"><span class="ic">📋</span> <span>Продуктивність</span></div></label>
          <label class="test-check on"><span class="num">2</span><input type="checkbox" value="enneagram" checked><div class="body"><span class="ic">🌀</span> <span>Еннеаграма</span></div></label>
          <label class="test-check on"><span class="num">3</span><input type="checkbox" value="disc" checked><div class="body"><span class="ic">📊</span> <span>DISC</span></div></label>
          <label class="test-check on"><span class="num">4</span><input type="checkbox" value="bigfive" checked><div class="body"><span class="ic">🌌</span> <span>Big Five</span></div></label>
          <label class="test-check on"><span class="num">5</span><input type="checkbox" value="iq" checked><div class="body"><span class="ic">🧠</span> <span>IQ</span></div></label>
          <label class="test-check on"><span class="num">6</span><input type="checkbox" value="reproduction" checked><div class="body"><span class="ic">👁️</span> <span>Відтворення</span></div></label>
        </div>
        <div class="picker-actions">
          <button type="button" onclick="pickerAll(true)">Усі</button>
          <button type="button" onclick="pickerAll(false)">Скинути</button>
        </div>
      </div>
      <div class="form-error" id="invErr"></div>
      <div style="display:flex; gap:10px">
        <button type="submit" class="btn btn-primary">Створити</button>
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal').style.display='none'">Скасувати</button>
      </div>
    </form>
    <div id="inviteResult" style="display:none; margin-top:16px"></div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/env.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
document.getElementById('sideLogo').innerHTML = brandLogoSvg(34) + '<span>AI-HRconnect</span>';

function openInvite() {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('inviteForm').style.display = 'block';
  document.getElementById('inviteResult').style.display = 'none';
  document.getElementById('invName').focus();
}

document.getElementById('inviteForm').onsubmit = async (e) => {
  e.preventDefault();
  const user = await currentUser();
  const token = crypto.randomUUID().replace(/-/g, '').slice(0, 16);
  const assignedTests = Array.from(document.querySelectorAll('#testsPicker input:checked')).map(i => i.value);
  if (assignedTests.length === 0) {
    alert('Оберіть хоча б один тест для призначення.');
    return;
  }
  const { data, error } = await sb.from('candidates').insert({
    user_id: user.id,
    name: document.getElementById('invName').value.trim(),
    email: document.getElementById('invEmail').value.trim() || null,
    phone: document.getElementById('invPhone').value.trim() || null,
    position: document.getElementById('invPosition').value.trim() || null,
    test_link_token: token,
    test_status: 'pending',
    assigned_tests: assignedTests
  }).select().single();
  if (error) { document.getElementById('invErr').textContent = error.message; return; }

  const url = window.location.origin + '/test/?t=' + token;
  document.getElementById('inviteForm').style.display = 'none';
  document.getElementById('inviteResult').style.display = 'block';
  document.getElementById('inviteResult').innerHTML =
    '<div style="background:#dff2dc; padding:14px; border-radius:8px; color:#2e7d32; margin-bottom:14px"><strong>✓ Створено!</strong></div>' +
    '<p>Посилання для кандидата:</p>' +
    '<input type="text" readonly value="' + url + '" class="form-input" onclick="this.select()">' +
    '<button class="btn btn-primary mt-4" onclick="navigator.clipboard.writeText(\'' + url + '\'); this.textContent=\'✓ Скопійовано\'">📋 Скопіювати посилання</button>' +
    '<button class="btn btn-ghost mt-4" style="margin-left:8px" onclick="document.getElementById(\'modal\').style.display=\'none\'; refresh()">Закрити</button>';
  refresh();
};

async function refresh() {
  const { data: cands } = await sb.from('candidates').select('*').order('created_at', { ascending: false });
  if (!cands || cands.length === 0) {
    document.getElementById('list').innerHTML = '<div class="card text-center"><p class="muted">Поки немає кандидатів. Натисніть «+ Запросити кандидата».</p></div>';
    return;
  }
  document.getElementById('list').innerHTML = '<div class="card" style="padding:0; overflow:hidden">' +
    '<table style="width:100%; border-collapse:collapse; font-size:14px"><thead style="background:#f8fafc; border-bottom:1px solid var(--c-line)"><tr>' +
    '<th style="text-align:left; padding:12px 16px">Імʼя</th><th style="text-align:left; padding:12px 16px">Посада</th><th style="text-align:left; padding:12px 16px">Статус</th><th style="text-align:left; padding:12px 16px">Посилання</th><th style="text-align:left; padding:12px 16px"></th>' +
    '</tr></thead><tbody>' +
    cands.map(c => {
      const url = c.test_link_token ? (window.location.origin + '/test/?t=' + c.test_link_token) : '';
      // Compute test completion progress
      const tests = [
        c.test_status === 'completed' || !!c.raw_answers,  // main
        c.enneagram_type != null,                           // enneagram
        !!c.disc_dominant,                                  // disc
        !!c.bigfive_dominant,                               // bigfive
        c.iq != null,                                       // iq
        c.reproduction != null                              // reproduction
      ];
      const completed = tests.filter(Boolean).length;
      const total = tests.length;
      const pct = Math.round(completed / total * 100);
      const statusColor = completed === total ? 'var(--c-green)' : (completed === 0 ? 'var(--c-muted)' : '#b45309');
      const statusBg = completed === total ? '#dcfce7' : (completed === 0 ? '#f1f5f9' : '#fef3c7');
      const progressHTML = `<div style="display:inline-flex; align-items:center; gap:8px"><span style="background:${statusBg}; color:${statusColor}; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600">${completed}/${total} · ${pct}%</span></div>`;
      return '<tr style="border-top:1px solid var(--c-line)">' +
        '<td style="padding:12px 16px; font-weight:600"><a href="/app/candidate.html?id=' + c.id + '" style="color:var(--c-brand)">' + esc(c.name) + '</a></td>' +
        '<td style="padding:12px 16px; color:var(--c-muted)">' + esc(c.position || '—') + '</td>' +
        '<td style="padding:12px 16px">' + progressHTML + '</td>' +
        '<td style="padding:12px 16px"><div style="display:flex; flex-direction:column; gap:4px">' + 
  (url ? '<div style="margin-bottom:6px"><a href="' + url + '" target="_blank" style="font-size:12px; font-weight:600">📋 Тест на продуктивність</a><div style="font-size:10.5px; color:var(--c-muted); line-height:1.35; margin-left:18px">розуміння продукту посади, результати, досягнення</div></div>' : '') +
  (ennUrl ? '<div style="margin-bottom:6px"><a href="' + ennUrl + '" target="_blank" style="font-size:12px; font-weight:600">🌀 Еннеаграма</a><div style="font-size:10.5px; color:var(--c-muted); line-height:1.35; margin-left:18px">9 типів особистості — що внутрішньо рухає людиною</div></div>' : '') +
  (discUrl ? '<div style="margin-bottom:6px"><a href="' + discUrl + '" target="_blank" style="font-size:12px; font-weight:600">📊 DISC</a><div style="font-size:10.5px; color:var(--c-muted); line-height:1.35; margin-left:18px">стиль робочої поведінки (Dominance/Influence/Steadiness/Conscientiousness)</div></div>' : '') +
  (bfUrl ? '<div style="margin-bottom:6px"><a href="' + bfUrl + '" target="_blank" style="font-size:12px; font-weight:600">🌌 Big Five</a><div style="font-size:10.5px; color:var(--c-muted); line-height:1.35; margin-left:18px">5 наукових вимірів OCEAN — найбільш валідована модель</div></div>' : '') +
  (iqUrl ? '<div style="margin-bottom:6px"><a href="' + iqUrl + '" target="_blank" style="font-size:12px; font-weight:600">🧠 IQ</a><div style="font-size:10.5px; color:var(--c-muted); line-height:1.35; margin-left:18px">когнітивні здібності — логіка, лічба, аналогії (15 хв з таймером)</div></div>' : '') +
  (repUrl ? '<div style="margin-bottom:6px"><a href="' + repUrl + '" target="_blank" style="font-size:12px; font-weight:600">👁️ Відтворення</a><div style="font-size:10.5px; color:var(--c-muted); line-height:1.35; margin-left:18px">точність сприйняття інструкцій та задач (5 хв)</div></div>' : '') +
'</div></td>' +
        '<td style="padding:12px 16px"><button class="btn btn-ghost" style="padding:5px 12px; font-size:12px" onclick="deleteCand(\'' + c.id + '\')">Видалити</button></td>' +
      '</tr>';
    }).join('') + '</tbody></table></div>';
}

async function deleteCand(id) {
  if (!confirm('Видалити кандидата?')) return;
  await sb.from('candidates').delete().eq('id', id);
  refresh();
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

(async () => { await requireAuth(); refresh(); })();
</script>
<script src="/assets/js/ux.js"></script>
</body></html>
